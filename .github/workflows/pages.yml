name: Deploy PYRA wallet

on:
  push:
    branches: [ "main" ]
    paths:
      - "public/**"
      - "test/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pyra-wallet-pages
  cancel-in-progress: true

jobs:
  test:
    name: Test public wallet package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Run tests
        run: npm test

  deploy:
    name: Deploy static wallet
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload wallet
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
