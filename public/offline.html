<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0d6f5d">
    <title>PYRA Wallet Offline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #f2f5f3;
        color: #152027;
        font-family: Arial, Helvetica, sans-serif;
      }
      main {
        width: min(520px, calc(100% - 32px));
        border: 1px solid #d4ddd8;
        background: #ffffff;
        padding: 28px;
      }
      img {
        width: 72px;
        height: 72px;
        border-radius: 50%;
      }
      h1 { margin: 18px 0 10px; font-size: 30px; }
      p { margin: 0; color: #60717a; line-height: 1.55; }
      a {
        display: inline-block;
        margin-top: 20px;
        color: #0d6f5d;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="pyra-wallet-icon.jpg" alt="PYRA logo">
      <h1>PYRA Wallet is offline</h1>
      <p>The installed wallet shell can reopen without internet. Offline IOU records remain local review artifacts and do not become blockchain transactions while disconnected.</p>
      <a href="index.html">Open wallet shell</a>
    </main>
  </body>
</html>
